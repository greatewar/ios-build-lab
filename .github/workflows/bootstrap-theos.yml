name: bootstrap-theos

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_theos_bootstrap:
        description: Run official Theos bootstrap smoke test
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  validate-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate repository layout and scripts
        run: bash scripts/validate-repo.sh

  theos-bootstrap-smoke:
    runs-on: ubuntu-latest
    needs: validate-repo
    if: github.event_name == 'push' || inputs.run_theos_bootstrap
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bootstrap Theos
        run: bash scripts/bootstrap-theos.sh

      - name: Collect bootstrap summary
        if: always()
        run: |
          mkdir -p artifacts
          {
            echo "event=${GITHUB_EVENT_NAME}"
            echo "sha=${GITHUB_SHA}"
            echo "theos=${THEOS:-$HOME/theos}"
            if [[ -d "${THEOS:-$HOME/theos}" ]]; then
              git -C "${THEOS:-$HOME/theos}" rev-parse HEAD || true
              find "${THEOS:-$HOME/theos}/sdks" -maxdepth 1 -type d -name '*.sdk' | sort || true
            fi
          } | tee artifacts/bootstrap-summary.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-theos-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7
